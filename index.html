<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Physics Sandbox — 2D Simulator | QuickUtils</title>
    <script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Physics Sandbox \u2014 2D Simulator",
    "url": "https://physics.quickutils.top/",
    "description": "Interactive 2D physics simulator with gravity, collisions, springs, pendulums, and projectile motion.",
    "applicationCategory": "BrowserApplication",
    "operatingSystem": "All",
    "offers": {
        "@type": "Offer",
        "price": "0.00",
        "priceCurrency": "USD"
    }
}
</script>
    <link rel="canonical" href="https://physics.quickutils.top/">
    <meta name="keywords" content="QuickUtils, physics, sandbox, code, design, productivity, online tools">
    <meta name="robots" content="index, follow">
    
    <meta property="og:title" content="Physics Sandbox — 2D Simulator | QuickUtils">
    <meta property="og:description" content="Interactive 2D physics simulator with gravity, collisions, springs, pendulums, and projectile motion.">
    <meta property="og:url" content="https://quickutils.top/physics-sandbox/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="description" content="Interactive 2D physics simulator with gravity, collisions, springs, pendulums, and projectile motion.">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#ffffff">
</head>
<body>
<nav class="navbar"><div class="container nav-inner"><a href="https://quickutils.top" class="brand">🔬 Physics Sandbox</a><div class="nav-links">
    <button id="playBtn" class="btn btn-primary btn-sm">▶ Play</button>
    <button id="resetBtn" class="btn btn-secondary btn-sm">🔄 Reset</button>
    <button id="themeBtn" class="theme-btn">🌙</button>
</div></div></nav>
<main class="app-layout container" style="margin-top:1rem">
    <aside class="glass-card sidebar">
        <h3>🧪 Objects</h3>
        <div class="obj-btns">
            <button class="btn btn-sm btn-secondary w-full" id="addCircle">⚫ Circle</button>
            <button class="btn btn-sm btn-secondary w-full" id="addBox">⬜ Box</button>
            <button class="btn btn-sm btn-secondary w-full" id="addPlatform">▬ Platform</button>
        </div>
        <hr style="border-color:var(--border);margin:.75rem 0">
        <h3>⚙️ World</h3>
        <label>Gravity <span id="gravVal">9.81</span><input type="range" id="gravity" min="0" max="30" step="0.1" value="9.81"></label>
        <label>Friction <span id="fricVal">0.3</span><input type="range" id="friction" min="0" max="1" step="0.01" value="0.3"></label>
        <label>Bounce <span id="bounceVal">0.6</span><input type="range" id="bounce" min="0" max="1" step="0.01" value="0.6"></label>
        <label>Time Scale <span id="timeVal">1.0</span><input type="range" id="timeScale" min="0.1" max="3" step="0.1" value="1"></label>
        <label><input type="checkbox" id="showVectors" checked> Show Vectors</label>
        <label><input type="checkbox" id="showTrails"> Show Trails</label>
        <hr style="border-color:var(--border);margin:.75rem 0">
        <h3>📐 Demos</h3>
        <button class="btn btn-sm btn-secondary w-full" id="demoPendulum">Pendulum</button>
        <button class="btn btn-sm btn-secondary w-full" id="demoProjectile">Projectile</button>
        <button class="btn btn-sm btn-secondary w-full" id="demoCradle">Newton's Cradle</button>
        <button class="btn btn-sm btn-secondary w-full" id="demoStack">Stack</button>
    </aside>
    <div class="canvas-wrap"><canvas id="physCanvas" width="800" height="600"></canvas>
        <div class="info-bar"><span id="objCount">Objects: 0</span><span id="fpsCounter">FPS: 60</span></div>
    </div>
</main>
<script src="script.js"></script>
</body></html>
